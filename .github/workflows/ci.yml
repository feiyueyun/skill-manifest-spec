name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-schema:
    name: Validate JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate schema is valid JSON
        run: python3 -m json.tool spec/skill-manifest-v1.schema.json > /dev/null
      - name: Validate examples against schema
        run: |
          pip install jsonschema
          for f in examples/*.skill.json; do
            echo "Validating $f..."
            python3 -c "
          import json, jsonschema
          schema = json.load(open('spec/skill-manifest-v1.schema.json'))
          instance = json.load(open('$f'))
          jsonschema.validate(instance, schema)
          print('  OK')
          "
          done

  go-library:
    name: Go Library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -v -count=1
